name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download GitHub Stats SVGs
        run: |
          curl -sL "https://github-readme-streak-stats.herokuapp.com/?user=xunrua&theme=transparent&stroke=6CABDD&ring=FFCE00&fire=FFC659&currStreakNum=6CABDD&sideNums=FFCE00&currStreakLabel=6CABDD&sideLabels=6CABDD&dates=1C2C5B" > assets/streak.svg
          curl -sL "https://github-profile-trophy.vercel.app/?username=xunrua&theme=dracula&no-frame=true&row=1&column=7&title_color=6CABDD&margin-w=10" > assets/trophy.svg
          curl -sL "https://github-readme-activity-graph.vercel.app/graph?username=xunrua&theme=react-dark&bg_color=00000000&color=6CABDD&line=6CABDD&point=FFCE00&area=true&area_color=6CABDD30" > assets/activity.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg assets/trophy.svg assets/activity.svg
          git diff --staged --quiet || (git commit -m "chore: update github stats [skip ci]" && git push)
